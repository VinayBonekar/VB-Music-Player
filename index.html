<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Bhajan Player</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #111; color: #eee; }
    #player { width: 100%; margin: 20px 0; background: #222; border-radius: 10px; }
    .btn { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    #folder-tree, #tracklist { border: 1px solid #444; padding: 15px; height: 350px; overflow-y: auto; background: #1a1a1a; }
    .item { cursor: pointer; padding: 8px; border-bottom: 1px solid #333; }
    .item:hover { background: #333; }
    .playing { background: #4f46e5 !important; }
  </style>
</head>
<body>
  <h1>🚩 Drive Music Player</h1>
  <button class="btn" id="signin" onclick="handleAuthClick()">🔐 Sign in with Google</button>
  <button class="btn" id="signout" onclick="handleSignoutClick()" style="display:none">🚪 Sign out</button>
  <p id="status">Please sign in to browse your "Music For Music Player" folder.</p>
  
  <div style="display:flex; gap:20px;">
    <div style="flex:1">
      <h3>📁 Subfolders</h3>
      <div id="folder-tree"></div>
    </div>
    <div style="flex:2">
      <h3>🎵 Tracks</h3>
      <div id="tracklist"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="playPause()">⏯ Play/Pause</button>
    <button class="btn" onclick="nextTrack()">⏭ Next</button>
    <input type="checkbox" id="repeat"> Repeat All
  </div>
  <audio id="player" controls></audio>

  <script>
    const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; 
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
    let playlist = []; let currentIndex = 0;
    
    function gapiLoaded() { gapi.load('client', initClient); }
    async function initClient() { await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }

    function handleAuthClick() {
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: async (resp) => { if(resp.access_token) findRootFolder(); }
      });
      tokenClient.requestAccessToken({prompt: 'consent'});
    }

    async function findRootFolder() {
      const resp = await gapi.client.drive.files.list({q: "name = 'Music For Music Player' and mimeType = 'application/vnd.google-apps.folder'"});
      if(resp.result.files.length > 0) loadSubFolders(resp.result.files[0].id);
    }

    async function loadSubFolders(parentId) {
      const resp = await gapi.client.drive.files.list({q: `'${parentId}' in parents and mimeType = 'application/vnd.google-apps.folder'`});
      const tree = document.getElementById('folder-tree');
      tree.innerHTML = '';
      resp.result.files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'item'; div.innerText = f.name;
        div.onclick = () => loadTracks(f.id);
        tree.appendChild(div);
      });
    }

    async function loadTracks(folderId) {
      const resp = await gapi.client.drive.files.list({q: `'${folderId}' in parents and mimeType = 'audio/mpeg'`});
      playlist = resp.result.files;
      const list = document.getElementById('tracklist');
      list.innerHTML = '';
      playlist.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'item'; div.innerText = t.name;
        div.onclick = () => playTrack(i);
        list.appendChild(div);
      });
    }

    function playTrack(i) {
      currentIndex = i;
      const audio = document.getElementById('player');
      audio.src = playlist[i].webContentLink;
      audio.play();
    }
    
    function playPause() { const a = document.getElementById('player'); a.paused ? a.play() : a.pause(); }
    function nextTrack() { if(currentIndex < playlist.length-1) playTrack(currentIndex+1); }
  </script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gapiLoaded()"></script>
</body>
</html>
