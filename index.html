<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VB Player</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS-specific PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VB Player">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Theme colour for browser chrome -->
  <meta name="theme-color" content="#f59e0b">

  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --text: #f8fafc; --selected: #4f46e5; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 250px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    h1 { font-size: 1.2rem; color: var(--accent); margin: 0; }
    .btn-icon { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
    .btn { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    #folder-tree { background: var(--card); border-radius: 12px; padding: 10px; height: 120px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #334155; font-size: 0.9rem; }
    #tracklist { background: var(--card); border-radius: 12px; padding: 10px; height: 400px; overflow-y: auto; border: 1px solid #334155; font-size: 0.9rem; }
    .item { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .item.selected { background: var(--selected); }
    .playing-icon { color: var(--accent); font-weight: bold; min-width: 20px; }
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 15px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 100; }
    .controls-main { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
    .options { display: flex; justify-content: center; gap: 15px; margin-top: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1> My Music... 🎵</h1>
    <button class="btn-icon" onclick="handleAuthClick()">👤</button>
  </header>
  <h3>📁 Folders</h3>
  <div id="folder-tree"></div>
  <h3>🎵 Tracks</h3>
  <div id="tracklist"></div>
  <div class="player-bar">
    <audio id="player" style="width: 100%;" controls></audio>
    <div class="options">
      <label><input type="checkbox" id="repeat"> 🔁 Loop</label>
      <label><input type="checkbox" id="shuffle"> 🔀 Shuffle</label>
      <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> ✅ All</label>
    </div>
    <div class="controls-main">
      <button class="btn" onclick="prevTrack()">⏮</button>
      <button class="btn" style="background:var(--accent); color:#000;" onclick="playPause()">⏯</button>
      <button class="btn" onclick="nextTrack()">⏭</button>
    </div>
  </div>
  <script>
    const CLIENT_ID = '144706464036-b9nrq2drtjn3jfn1p1ecftl7808f13is.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
    let playlist = []; let selectedPlaylist = []; let currentIdxInSelected = 0;

    function gapiLoaded() { gapi.load('client', () => { gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }); }
    async function handleAuthClick() {
      const client = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (r) => { if(r.access_token) findRoot(); } });
      client.requestAccessToken({prompt: 'consent'});
    }
    async function findRoot() {
      const r = await gapi.client.drive.files.list({q: "name = 'Music For Music Player' and mimeType = 'application/vnd.google-apps.folder'"});
      if(r.result.files.length) loadFolders(r.result.files[0].id);
    }
    async function loadFolders(parentId) {
      const r = await gapi.client.drive.files.list({q: `'${parentId}' in parents and mimeType = 'application/vnd.google-apps.folder'`, orderBy: 'name'});
      const tree = document.getElementById('folder-tree'); tree.innerHTML = '';
      r.result.files.forEach(f => {
        const d = document.createElement('div'); d.className = 'item'; d.innerText = '📁 ' + f.name;
        d.onclick = () => { resetEverything(); loadTracks(f.id); };
        tree.appendChild(d);
      });
    }
    function resetEverything() {
        document.getElementById('player').pause();
        document.getElementById('player').src = '';
        document.getElementById('player').removeAttribute('data-id');
        document.getElementById('tracklist').innerHTML = '';
        document.getElementById('selectAll').checked = false;
        playlist = []; selectedPlaylist = []; currentIdxInSelected = 0;
    }
    async function loadTracks(folderId) {
      const r = await gapi.client.drive.files.list({q: `'${folderId}' in parents and mimeType = 'audio/mpeg'`, orderBy: 'name'});
      playlist = r.result.files;
      renderTracks();
    }
    function renderTracks() {
      const list = document.getElementById('tracklist'); list.innerHTML = '';
      playlist.forEach((t, i) => {
        const d = document.createElement('div'); d.className = 'item'; d.id = 'track-' + i;
        d.innerHTML = `<span class="playing-icon" id="icon-${i}"></span><input type="checkbox" id="check-${i}"> ${t.name.replace('.mp3','')}`;
        d.onclick = (e) => {
            const chk = document.getElementById('check-'+i);
            if(e.target.tagName !== 'INPUT') chk.checked = !chk.checked;
            d.classList.toggle('selected', chk.checked);
            updateSelection();
            if(chk.checked) {
                let idx = selectedPlaylist.indexOf(playlist[i]);
                if(idx !== -1) playTrack(idx);
            }
        };
        list.appendChild(d);
      });
    }
    function toggleSelectAll() {
        const all = document.getElementById('selectAll').checked;
        playlist.forEach((_, i) => {
            document.getElementById('check-'+i).checked = all;
            document.getElementById('track-'+i).classList.toggle('selected', all);
        });
        updateSelection();
        if(all && selectedPlaylist.length > 0) playTrack(0);
    }
    function updateSelection() {
        selectedPlaylist = playlist.filter((_, i) => document.getElementById('check-'+i).checked);
        const audio = document.getElementById('player');
        const currentId = audio.getAttribute('data-id');
        if(currentId && !selectedPlaylist.some(f => f.id === currentId)) {
            audio.pause(); audio.src = ''; audio.removeAttribute('data-id');
            document.querySelectorAll('.playing-icon').forEach(el => el.innerText = '');
        }
    }
    async function playTrack(idxInSelected) {
      if(selectedPlaylist.length === 0) return;
      currentIdxInSelected = idxInSelected;
      const file = selectedPlaylist[currentIdxInSelected];
      const audio = document.getElementById('player');
      const token = gapi.client.getToken().access_token;

      audio.setAttribute('data-id', file.id);
      document.querySelectorAll('.playing-icon').forEach(el => el.innerText = '');
      const originalIdx = playlist.findIndex(f => f.id === file.id);
      if(originalIdx !== -1) document.getElementById('icon-' + originalIdx).innerText = '▶️';

      // Update lock screen / Now Playing metadata via Media Session API
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: file.name.replace('.mp3', ''),
          artist: 'VB Player',
          artwork: [{ src: 'icon-192.png', sizes: '192x192', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
      }

      try {
          audio.src = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&access_token=${encodeURIComponent(token)}`;
          audio.load();
          audio.play();
      } catch(e) { console.error(e); }
      /*
      try {
          const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, { headers: { 'Authorization': `Bearer ${token}` } });
          const blob = await resp.blob();
          audio.src = URL.createObjectURL(blob);
          audio.play();
      } catch(e) { console.error(e); }
      */
    }
    document.getElementById('player').addEventListener('ended', () => {
        if(document.getElementById('repeat').checked && selectedPlaylist.length === 1) playTrack(currentIdxInSelected);
        else if(selectedPlaylist.length > 0) nextTrack();
    });
    function playPause() { const a = document.getElementById('player'); a.paused ? a.play() : a.pause(); }
    function nextTrack() {
        if(selectedPlaylist.length === 0) return;
        let next = document.getElementById('shuffle').checked ? Math.floor(Math.random() * selectedPlaylist.length) : (currentIdxInSelected + 1) % selectedPlaylist.length;
        playTrack(next);
    }
    function prevTrack() {
        if(selectedPlaylist.length === 0) return;
        let prev = (currentIdxInSelected - 1 + selectedPlaylist.length) % selectedPlaylist.length;
        playTrack(prev);
    }

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gapiLoaded()"></script>
</body>
</html>
