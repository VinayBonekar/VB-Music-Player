<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Divine Player</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #f59e0b;
      --text: #f8fafc;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 150px; }
    h1 { font-size: 1.5rem; text-align: center; color: var(--accent); margin-bottom: 20px; }
    .btn { background: #334155; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: 500; }
    .btn-primary { background: var(--accent); color: #000; }
    #folder-tree, #tracklist { background: var(--card); border-radius: 12px; padding: 15px; height: 250px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #334155; }
    .item { padding: 15px; border-bottom: 1px solid #334155; display: flex; align-items: center; cursor: pointer; }
    .item.playing { background: #4f46e5 !important; border-radius: 8px; }
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 15px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 100; }
    .controls-main { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
    .options { display: flex; justify-content: center; gap: 25px; align-items: center; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
    .toggle-wrap input { width: 25px; height: 25px; accent-color: var(--accent); }
  </style>
</head>
<body>
  <h1>ॐ Divine Bhajan Player</h1>
  <div style="text-align: center;">
    <button class="btn" id="signin" onclick="handleAuthClick()">🔐 Sign in</button>
    <button class="btn" id="signout" onclick="handleSignoutClick()" style="display:none">🚪 Sign out</button>
  </div>
  <h3>📁 Subfolders</h3>
  <div id="folder-tree"></div>
  <h3>🎵 Tracks</h3>
  <div id="tracklist"></div>
  <div class="player-bar">
    <audio id="player" style="width: 100%;" controls></audio>
    <div class="controls-main">
      <button class="btn" onclick="prevTrack()">⏮</button>
      <button class="btn btn-primary" onclick="playPause()">⏯</button>
      <button class="btn" onclick="nextTrack()">⏭</button>
    </div>
    <div class="options">
      <label class="toggle-wrap"><input type="checkbox" id="repeat"> 🔁 Loop</label>
      <label class="toggle-wrap"><input type="checkbox" id="shuffle"> 🔀 Shuffle</label>
    </div>
  </div>
  <script>
    const CLIENT_ID = '144706464036-b9nrq2drtjn3jfn1p1ecftl7808f13is.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
    let playlist = []; let currentIndex = 0;
    function gapiLoaded() { gapi.load('client', initClient); }
    async function initClient() { await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }
    function handleAuthClick() {
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: async (resp) => { if(resp.access_token) findRootFolder(); }
      });
      tokenClient.requestAccessToken({prompt: 'consent'});
    }
    async function findRootFolder() {
      const resp = await gapi.client.drive.files.list({q: "name = 'Music For Music Player' and mimeType = 'application/vnd.google-apps.folder'"});
      if(resp.result.files.length > 0) loadSubFolders(resp.result.files[0].id);
    }
    async function loadSubFolders(parentId) {
      const resp = await gapi.client.drive.files.list({q: `'${parentId}' in parents and mimeType = 'application/vnd.google-apps.folder'`, orderBy: 'name'});
      const tree = document.getElementById('folder-tree'); tree.innerHTML = '';
      resp.result.files.forEach(f => {
        const div = document.createElement('div'); div.className = 'item'; div.innerText = '📁 ' + f.name;
        div.onclick = () => loadTracks(f.id); tree.appendChild(div);
      });
    }
    async function loadTracks(folderId) {
      const resp = await gapi.client.drive.files.list({q: `'${folderId}' in parents and mimeType = 'audio/mpeg'`, orderBy: 'name'});
      playlist = resp.result.files;
      const list = document.getElementById('tracklist'); list.innerHTML = '';
      playlist.forEach((t, i) => {
        const div = document.createElement('div'); div.className = 'item'; div.innerText = '🎵 ' + t.name.replace('.mp3', '');
        div.onclick = () => playTrack(i); list.appendChild(div);
      });
    }
    function playTrack(i) {
      currentIndex = i; const audio = document.getElementById('player');
      const token = gapi.client.getToken().access_token;
      audio.src = `https://www.googleapis.com/drive/v3/files/${playlist[i].id}?alt=media&access_token=${token}`;
      audio.load(); audio.play(); updateUI();
    }
    function playPause() { const a = document.getElementById('player'); a.paused ? a.play() : a.pause(); }
    function nextTrack() {
      if(document.getElementById('shuffle').checked) currentIndex = Math.floor(Math.random() * playlist.length);
      else currentIndex = (currentIndex + 1) % playlist.length;
      playTrack(currentIndex);
    }
    function prevTrack() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; playTrack(currentIndex); }
    function updateUI() { document.querySelectorAll('.item').forEach((el, i) => el.classList.toggle('playing', i === currentIndex)); }
    document.getElementById('player').addEventListener('ended', () => { if(document.getElementById('repeat').checked) nextTrack(); });
  </script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gapiLoaded()"></script>
</body>
</html>
