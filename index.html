<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bhajan Player</title>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --text: #f8fafc; --selected: #4f46e5; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 250px; }
    h1 { font-size: 1.3rem; text-align: center; color: var(--accent); margin-bottom: 15px; }
    .btn { background: #334155; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin: 5px; font-size: 0.9rem; }
    .btn-primary { background: var(--accent); color: #000; }
    #folder-tree { background: var(--card); border-radius: 12px; padding: 10px; height: 150px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #334155; font-size: 0.9rem; }
    #tracklist { background: var(--card); border-radius: 12px; padding: 10px; height: 500px; overflow-y: auto; border: 1px solid #334155; font-size: 0.9rem; }
    .item { padding: 12px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .item.selected { background: var(--selected); }
    .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 100; }
    .controls-main { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
    .options { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
  </style>
</head>
<body>
  <h1>ॐ Divine Player</h1>
  <button class="btn" onclick="handleAuthClick()">🔐 Sign In</button>
  <h3>📁 Folders</h3>
  <div id="folder-tree"></div>
  <h3>🎵 Tracks</h3>
  <div id="tracklist"></div>
  <div class="player-bar">
    <audio id="player" style="width: 100%;" controls></audio>
    <div class="options">
      <label><input type="checkbox" id="repeat"> 🔁 Loop</label>
      <label><input type="checkbox" id="shuffle"> 🔀 Shuffle</label>
    </div>
    <div class="controls-main">
      <button class="btn" onclick="prevTrack()">⏮</button>
      <button class="btn btn-primary" onclick="playPause()">⏯</button>
      <button class="btn" onclick="nextTrack()">⏭</button>
    </div>
  </div>
  <script>
    const CLIENT_ID = '144706464036-b9nrq2drtjn3jfn1p1ecftl7808f13is.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
    let playlist = []; let currentIndex = 0;
    function gapiLoaded() { gapi.load('client', () => { gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }); }
    async function handleAuthClick() {
      const client = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (r) => { if(r.access_token) findRoot(); } });
      client.requestAccessToken({prompt: 'consent'});
    }
    async function findRoot() {
      const r = await gapi.client.drive.files.list({q: "name = 'Music For Music Player' and mimeType = 'application/vnd.google-apps.folder'"});
      if(r.result.files.length) loadFolders(r.result.files[0].id);
    }
    async function loadFolders(parentId) {
      const r = await gapi.client.drive.files.list({q: `'${parentId}' in parents and mimeType = 'application/vnd.google-apps.folder'`, orderBy: 'name'});
      const tree = document.getElementById('folder-tree'); tree.innerHTML = '';
      r.result.files.forEach(f => {
        const d = document.createElement('div'); d.className = 'item'; d.innerText = '📁 ' + f.name;
        d.onclick = () => loadTracks(f.id); tree.appendChild(d);
      });
    }
    async function loadTracks(folderId) {
      const r = await gapi.client.drive.files.list({q: `'${folderId}' in parents and mimeType = 'audio/mpeg'`, orderBy: 'name'});
      playlist = r.result.files;
      const list = document.getElementById('tracklist'); list.innerHTML = '';
      playlist.forEach((t, i) => {
        const d = document.createElement('div'); d.className = 'item'; d.id = 'track-' + i;
        d.innerHTML = `<input type="checkbox" id="check-${i}"> ${t.name.replace('.mp3','')}`;
        d.onclick = (e) => { 
            const checkbox = document.getElementById('check-'+i);
            if(e.target.tagName !== 'INPUT') {
                checkbox.checked = !checkbox.checked;
                d.classList.toggle('selected', checkbox.checked);
            } else {
                d.classList.toggle('selected', checkbox.checked);
            }
        };
        list.appendChild(d);
      });
    }
    
/*    function playTrack(i) {
      currentIndex = i; const audio = document.getElementById('player');
      const token = gapi.client.getToken().access_token;
      audio.src = `https://www.googleapis.com/drive/v3/files/${playlist[i].id}?alt=media&access_token=${token}`;
      audio.load();
      audio.play().catch(e => console.log("Manual play triggered"));
    }
*/
    async function playTrack(i) {
    currentIndex = i;
    const audio = document.getElementById('player');
    const fileId = playlist[i].id;
    const token = gapi.client.getToken().access_token;
        try {
          const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (!response.ok) throw new Error('Failed to fetch audio');
          
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          
          audio.src = url;
          audio.play();
        } catch (e) {
      console.error("Playback failed:", e);
      alert("Could not stream the file. Ensure the file is not corrupted.");
      }
    }
    
    function playPause() { const a = document.getElementById('player'); a.paused ? a.play() : a.pause(); }
    function nextTrack() { 
      let next = document.getElementById('shuffle').checked ? Math.floor(Math.random() * playlist.length) : (currentIndex + 1) % playlist.length;
      playTrack(next); 
    }
    function prevTrack() { playTrack((currentIndex - 1 + playlist.length) % playlist.length); }
  </script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gapiLoaded()"></script>
</body>
</html>
